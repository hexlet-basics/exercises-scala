---

name: Основы Scala
description: |
  Scala — мультипарадигменный язык программирования, объединяющий объектно-ориентированный и функциональный подходы. Он работает на виртуальной машине Java (JVM) и применяется в высоконагруженных и распределённых системах. В первом модуле познакомимся с основами языка.
